<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Input Data Layanan</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <h1>Sistem Input Data Layanan</h1>
      <div class="nav-links">
        <a href="index.html" class="active">Form Input</a>
        <a href="tabel.html">Tabel Data</a>
      </div>
    </nav>

    <main class="card">
      <h2>Form Input Data</h2>
      <p class="subtitle">Silakan isi data di bawah ini dengan lengkap.</p>

      <form id="dataForm">
        <div class="form-group">
          <label for="nama">Nama</label>
          <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required />
        </div>

        <div class="form-group">
          <label for="nim">NIM</label>
          <input type="text" id="nim" name="nim" placeholder="Masukkan NIM" required />
        </div>

        <div class="form-group">
          <label for="jenisLayanan">Jenis Layanan</label>
          <select id="jenisLayanan" name="jenisLayanan" required>
            <option value="" disabled selected>Pilih jenis layanan</option>
            <option value="Bimbingan Akademik">Bimbingan Akademik</option>
            <option value="Legalisir Dokumen">Legalisir Dokumen</option>
            <option value="Surat Keterangan">Surat Keterangan</option>
            <option value="Konsultasi Tugas Akhir">Konsultasi Tugas Akhir</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>

        <div class="form-group">
          <label for="keterangan">Keterangan</label>
          <textarea id="keterangan" name="keterangan" rows="4" placeholder="Tambahkan keterangan (opsional)"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Simpan Data</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>

        <p id="statusMsg" class="status-msg"></p>
      </form>
    </main>

    <footer>
      <p>&copy; 2026 Sistem Web Sederhana - Tugas SUB-CPMK-07-2-8</p>
    </footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
